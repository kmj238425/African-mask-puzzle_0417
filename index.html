}
function updateLayout(scrId){
  const scr = document.getElementById(scrId);
  const el = document.getElementById('bgi-'+scrId);
  if(!el || !el.naturalWidth) return;
  const nW=el.naturalWidth, nH=el.naturalHeight;
  const cW=Math.min(scr.offsetWidth,window.innerWidth)||window.innerWidth;
  const cH=Math.min(scr.offsetHeight,window.innerHeight)||window.innerHeight;
  let bw,bh;
  if(cW/cH < nW/nH){ bw=cW; bh=cW*(nH/nW); }
  else { bh=cH; bw=cH*(nW/nH); }
  const bx=(cW-bw)/2, by=(cH-bh)/2;
  bgLayout[scrId]={bw,bh,bx,by};
}

  return{bw,bh,bx:(W-bw)/2,by:0};
}

let AC;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function snap(){try{initAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=880;g.gain.setValueAtTime(.2,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.08);o.start();o.stop(AC.currentTime+.08);}catch(e){}}

// 퍼즐 엔진
function jigsawEdge(c,x1,y1,x2,y2,dir){
  const dx=x2-x1,dy=y2-y1,L=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/L,uy=dy/L,nx=-uy,ny=ux,b=0.25,h=dir*0.15*L;
  c.lineTo(x1+ux*L*(0.5-b),y1+uy*L*(0.5-b));
  c.bezierCurveTo(x1+ux*L*(0.5-b)+nx*h,y1+uy*L*(0.5-b)+ny*h,
    x1+ux*L*0.5+nx*h*1.5,y1+uy*L*0.5+ny*h*1.5,
    x1+ux*L*0.5+nx*h*1.5,y1+uy*L*0.5+ny*h*1.5);
  c.bezierCurveTo(x1+ux*L*0.5+nx*h*1.5,y1+uy*L*0.5+ny*h*1.5,
    x1+ux*L*(0.5+b)+nx*h,y1+uy*L*(0.5+b)+ny*h,
    x1+ux*L*(0.5+b),y1+uy*L*(0.5+b));
  c.lineTo(x2,y2);
}

function buildPath(c,row,col,x0,y0,x1,y1,eH,eV,gcols,grows){
  gcols=gcols||GCOLS; grows=grows||GROWS;
  c.beginPath();c.moveTo(x0,y0);
  if(row===0)c.lineTo(x1,y0);else jigsawEdge(c,x0,y0,x1,y0,-eH[row-1][col]);
  if(col===gcols-1)c.lineTo(x1,y1);else jigsawEdge(c,x1,y0,x1,y1,eV[row][col]);
  if(row===grows-1)c.lineTo(x0,y1);else jigsawEdge(c,x1,y1,x0,y1,eH[row][col]);
  if(col===0)c.lineTo(x0,y0);else jigsawEdge(c,x0,y1,x0,y0,-eV[row][col-1]);
  c.closePath();
}

function makePiece(row,col,cW,cH,eH,eV,mImg,sil,GCOLS,GROWS){
  // PAD는 요철 최대 돌출(0.225*L)보다 커야 함
  const PAD=Math.ceil(Math.min(cW,cH)*0.26);
  const cw=Math.ceil(cW)+PAD*2, ch=Math.ceil(cH)+PAD*2;
  const oc=document.createElement('canvas'); oc.width=cw; oc.height=ch;
  const ctx=oc.getContext('2d');
  const x0=PAD,y0=PAD,x1=PAD+cW,y1=PAD+cH;

  const sw=mImg.naturalWidth/GCOLS, sh=mImg.naturalHeight/GROWS;
  const spx=PAD*(sw/cW), spy=PAD*(sh/cH);
  const srcX=Math.max(0,col*sw-spx), srcY=Math.max(0,row*sh-spy);
  const srcW=Math.min(mImg.naturalWidth-srcX,sw+spx*2);
  const srcH=Math.min(mImg.naturalHeight-srcY,sh+spy*2);
  const dstX=(col*sw>=spx)?0:(spx-col*sw)*(cW/sw);
  const dstY=(row*sh>=spy)?0:(spy-row*sh)*(cH/sh);

  // 1) 요철 clip → 이미지
  ctx.save();
  buildPath(ctx,row,col,x0,y0,x1,y1,eH,eV,GCOLS,GROWS); ctx.clip();
  ctx.drawImage(mImg,srcX,srcY,srcW,srcH,dstX,dstY,srcW*(cW/sw),srcH*(cH/sh));
  ctx.restore();

  // 2) SIL 마스킹 (stage 1,3)
  if(sil){
    const bTW=cW*GCOLS, bTH=cH*GROWS;
    const sC=document.createElement('canvas'); sC.width=sil.w; sC.height=sil.h;
    const sCtx=sC.getContext('2d');
    const sid=sCtx.createImageData(sil.w,sil.h);
    for(let i=0;i<sil.data.length;i++){
      if(sil.data[i]===1){sid.data[i*4]=255;sid.data[i*4+3]=255;}
    }
    sCtx.putImageData(sid,0,0);
    const sF=document.createElement('canvas'); sF.width=bTW; sF.height=bTH;
    const sfCtx=sF.getContext('2d');
    sfCtx.imageSmoothingEnabled=true; sfCtx.imageSmoothingQuality='high';
    sfCtx.drawImage(sC,0,0,bTW,bTH);
    const offX=col*cW-PAD, offY=row*cH-PAD;
    ctx.globalCompositeOperation='destination-in';
    ctx.drawImage(sF,-offX,-offY);
    ctx.globalCompositeOperation='source-over';
  }

  // 3) 흰 테두리
  buildPath(ctx,row,col,x0,y0,x1,y1,eH,eV,GCOLS,GROWS);
  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1.2; ctx.stroke();
  oc._pad=PAD; return oc;
}

function makeBgCvs(bW,bH,sil,gcols,grows,eH,eV){
  gcols=gcols||GCOLS; grows=grows||GROWS;
  const oc=document.createElement('canvas'); oc.width=bW; oc.height=bH;
  const ctx=oc.getContext('2d');
  if(sil){
    const tmp=document.createElement('canvas'); tmp.width=sil.w; tmp.height=sil.h;
    const tCtx=tmp.getContext('2d');
    const id=tCtx.createImageData(sil.w,sil.h);
    for(let i=0;i<sil.data.length;i++){
      if(sil.data[i]===1){id.data[i*4]=185;id.data[i*4+1]=145;id.data[i*4+2]=50;id.data[i*4+3]=220;}
    }
    tCtx.putImageData(id,0,0);
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
    ctx.drawImage(tmp,0,0,bW,bH);
    // 실루엣 위에도 요철 경계선
    if(eH&&eV){
      ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.2;
      const cWs=bW/gcols, cHs=bH/grows;
      for(let r=0;r<grows;r++) for(let c=0;c<gcols;c++){
        ctx.beginPath(); ctx.moveTo(c*cWs,r*cHs);
        if(r===0) ctx.lineTo((c+1)*cWs,r*cHs);
        else jigsawEdge(ctx,c*cWs,r*cHs,(c+1)*cWs,r*cHs,-eH[r-1][c]);
        if(c===gcols-1) ctx.lineTo((c+1)*cWs,(r+1)*cHs);
        else jigsawEdge(ctx,(c+1)*cWs,r*cHs,(c+1)*cWs,(r+1)*cHs,eV[r][c]);
        if(r===grows-1) ctx.lineTo(c*cWs,(r+1)*cHs);
        else jigsawEdge(ctx,(c+1)*cWs,(r+1)*cHs,c*cWs,(r+1)*cHs,eH[r][c]);
        if(c===0) ctx.lineTo(c*cWs,r*cHs);
        else jigsawEdge(ctx,c*cWs,(r+1)*cHs,c*cWs,r*cHs,-eV[r][c-1]);
        ctx.closePath(); ctx.stroke();
      }
    }
  } else {
    // 직소 경계선 그리기 (실제 조각 모양과 동일)
    ctx.strokeStyle='rgba(150,110,60,0.7)'; ctx.lineWidth=1.8;
    const cW=bW/gcols, cH=bH/grows;
    for(let r=0;r<grows;r++) for(let c=0;c<gcols;c++){
      ctx.beginPath(); ctx.moveTo(c*cW, r*cH);
      // 위 변
      if(r===0) ctx.lineTo((c+1)*cW, r*cH);
      else jigsawEdge(ctx, c*cW,r*cH, (c+1)*cW,r*cH, -eH[r-1][c]);
      // 오른 변
      if(c===gcols-1) ctx.lineTo((c+1)*cW, (r+1)*cH);
      else jigsawEdge(ctx, (c+1)*cW,r*cH, (c+1)*cW,(r+1)*cH, eV[r][c]);
      // 아래 변
      if(r===grows-1) ctx.lineTo(c*cW, (r+1)*cH);
      else jigsawEdge(ctx, (c+1)*cW,(r+1)*cH, c*cW,(r+1)*cH, eH[r][c]);
      // 왼 변
      if(c===0) ctx.lineTo(c*cW, r*cH);
      else jigsawEdge(ctx, c*cW,(r+1)*cH, c*cW,r*cH, -eV[r][c-1]);
      ctx.closePath(); ctx.stroke();
    }
  }
  return oc;
}

function p2(n){return String(n).padStart(2,'0');}

function initPuzzle(stage){
  const scrId='s'+(stage===1?2:stage===2?4:6);
  const scr=document.getElementById(scrId);
  scr.querySelectorAll('.pz-el').forEach(e=>e.remove());

  // Stage별 조각 수: Stage2는 3x4=12조각
  const GCOLS=stage===2?3:2;
  const GROWS=4;

  const {bw,bh,bx,by}=getBg();
  if(!bw||!bh){ setTimeout(()=>initPuzzle(stage),50); return; }

  const L1=by+bh*0.1095, L2=by+bh*0.2055, FT=by+bh*0.912;
  const hudH=L2-L1, pzTop=L2, pzH=FT-pzTop;

  // HUD
  [{x:0.207,id:'mv',lbl:'이동',def:'0'},
   {x:0.499,id:'pg',lbl:'완성도',def:'0%'},
   {x:0.781,id:'tmr',lbl:'시간',def:'00:00'}
  ].forEach(h=>{
    const lb=document.createElement('div'); lb.className='pz-el';
    lb.style.cssText=`position:fixed;font-family:'Noto Sans KR',sans-serif;font-weight:400;` +
      `font-size:clamp(10px,2.5vw,14px);color:#1a0e02;text-align:center;pointer-events:none;` +
      `transform:translate(-50%,-50%);white-space:nowrap;z-index:20;` +
      `left:${bx+bw*h.x}px;top:${L1+hudH*0.32}px;`;
    lb.textContent=h.lbl; scr.appendChild(lb);
    const vl=document.createElement('div'); vl.className='pz-el'; vl.id='v_'+stage+'_'+h.id;
    vl.style.cssText=`position:fixed;font-family:'Cinzel',serif;font-weight:700;` +
      `font-size:clamp(13px,3.5vw,22px);color:#1a0e02;text-align:center;pointer-events:none;` +
      `transform:translate(-50%,-50%);white-space:nowrap;z-index:20;` +
      `left:${bx+bw*h.x}px;top:${L1+hudH*0.70}px;`;
    vl.textContent=h.def; scr.appendChild(vl);
  });

  const tLW=bw*0.18, tRW=bw*0.18, bAW=bw*0.64;
  const mImg=MASKS[stage], sil=SILS[stage];
  const silR=sil?(sil.imgW/sil.imgH):0.52;
  // 보드 높이: pzH의 95% 또는 bAW/silR 중 작은 값
  // 단, FT를 절대 넘지 않도록 clamp
  const bHmax=Math.min(pzH*0.88, bAW/silR);
  const bH=bHmax, bW=Math.round(bH*silR);
  if(bW<=0||bH<=0){ setTimeout(()=>initPuzzle(stage),50); return; }

  const cW=bW/GCOLS, cH=bH/GROWS;
  const bc=document.getElementById('bc'+stage);
  bc.width=bW; bc.height=bH;
  const bcLeft=bx+(bw-bW)/2;
  // 위치: 중앙이되 FT를 넘지 않도록
  // FT 기준으로 보드 하단 위치 고정
  bc.style.left=bcLeft+'px';
  bc.style.top=(pzTop+(pzH-bH)/2)+'px';

  const eH=[],eV=[];
  for(let r=0;r<GROWS-1;r++) eH.push(Array.from({length:GCOLS},()=>Math.random()<.5?1:-1));
  for(let r=0;r<GROWS;r++)   eV.push(Array.from({length:GCOLS-1},()=>Math.random()<.5?1:-1));

  function run(){
    const bgCvs=makeBgCvs(bW,bH,sil,GCOLS,GROWS,eH,eV);
    const pieces=[];
    for(let r=0;r<GROWS;r++) for(let c=0;c<GCOLS;c++){
      const cv=makePiece(r,c,cW,cH,eH,eV,mImg,sil,GCOLS,GROWS);
      pieces.push({row:r,col:c,placed:false,canvas:cv,pad:cv._pad,side:null,el:null});
    }
    const sh=[...pieces].sort(()=>Math.random()-.5);
    const half=Math.floor(sh.length/2);
    sh.forEach((pc,i)=>pc.side=i<half?'left':'right');

    // Stage2는 6조각/트레이이므로 더 작게
    const trayPieces=Math.ceil(GCOLS*GROWS/2);
    const maxH=Math.floor(bH/trayPieces)-4;
    const maxW=Math.floor(Math.min(tLW,tRW)*0.90);
    const pzTopActual=parseFloat(bc.style.top);

    ['left','right'].forEach(side=>{
      const spc=sh.filter(p=>p.side===side);
      const tx=side==='left'?bx+tLW*0.5:bx+bw-tRW*0.5;
      spc.forEach((pc,i)=>{
        const sc2=Math.min(maxW/pc.canvas.width,maxH/pc.canvas.height);
        const tw=Math.round(pc.canvas.width*sc2), th=Math.round(pc.canvas.height*sc2);
        const off=document.createElement('canvas'); off.width=tw; off.height=th;
        off.getContext('2d').drawImage(pc.canvas,0,0,pc.canvas.width,pc.canvas.height,0,0,tw,th);
        const img=document.createElement('img'); img.className='pz-el';
        img.src=off.toDataURL('image/png');
        const bcTopActual=parseFloat(bc.style.top)||pzTopActual;
        img.style.cssText=`position:fixed;touch-action:none;cursor:grab;z-index:15;` +
          `width:${tw}px;height:${th}px;` +
          `left:${tx-tw/2}px;top:${bcTopActual+bH*((i+0.5)/trayPieces)-th/2}px;`;
        pc.el=img; scr.appendChild(img);
        const onD=e=>{e.preventDefault();e.stopPropagation();initAC();
          drag={p:pc,stage,fromTray:true,gc:null,gr:null}; renderBoard(stage);};
        img.addEventListener('mousedown',onD);
        img.addEventListener('touchstart',onD,{passive:false});
      });
    });

    let moves=0,secs=0;
    const ticker=setInterval(()=>{
      secs++;
      const el=document.getElementById('v_'+stage+'_tmr');
      if(el) el.textContent=p2(Math.floor(secs/60))+':'+p2(secs%60);
    },1000);
    games[stage]={pieces,bgCvs,bW,bH,cW,cH,bc,moves,ticker,gcols:GCOLS,grows:GROWS};
    updHUD(stage); renderBoard(stage);
    bc.addEventListener('mousedown',e=>{e.preventDefault();onBD(e,stage);});
    bc.addEventListener('touchstart',e=>{e.preventDefault();onBD(e,stage);},{passive:false});
  }

  if(mImg.complete&&mImg.naturalWidth>0) run();
  else mImg.onload=run;
}

function updHUD(s){
  const g=games[s]; if(!g) return;
  const mv=document.getElementById('v_'+s+'_mv');
  const pg=document.getElementById('v_'+s+'_pg');
  if(mv) mv.textContent=g.moves;
  if(pg){const n=g.pieces.filter(p=>p.placed).length; pg.textContent=Math.round(n/g.pieces.length*100)+'%';}
}

function renderBoard(s){
  const g=games[s]; if(!g) return;
  const ctx=g.bc.getContext('2d');
  // 배경색으로 먼저 채워서 뒤 이미지 안 비치게
  ctx.fillStyle='rgb(225,210,192)';
  ctx.fillRect(0,0,g.bW,g.bH);
  if(g.bgCvs) ctx.drawImage(g.bgCvs,0,0);
  g.pieces.filter(p=>p.placed).forEach(p=>
    ctx.drawImage(p.canvas,p.col*g.cW-p.pad,p.row*g.cH-p.pad));
  if(drag&&drag.stage===s){
    if(!drag.fromTray){
      ctx.save();ctx.shadowColor='rgba(80,40,5,.5)';ctx.shadowBlur=10;
      ctx.drawImage(drag.p.canvas,drag.bx,drag.by);ctx.restore();
    }
    if(drag.fromTray&&drag.gc!=null){
      ctx.save();ctx.globalAlpha=.4;
      ctx.drawImage(drag.p.canvas,drag.gc*g.cW-drag.p.pad,drag.gr*g.cH-drag.p.pad);
      ctx.restore();
    }
  }
}

function onBD(e,s){
  const g=games[s]; if(!g) return;
  const r=g.bc.getBoundingClientRect(), src=e.touches?e.touches[0]:e;
  const px=(src.clientX-r.left)*(g.bW/r.width), py=(src.clientY-r.top)*(g.bH/r.height);
  for(let i=g.pieces.length-1;i>=0;i--){
    const p=g.pieces[i]; if(!p.placed) continue;
    if(px>=p.col*g.cW&&px<(p.col+1)*g.cW&&py>=p.row*g.cH&&py<(p.row+1)*g.cH){
      p.placed=false; g.moves++;
      drag={p,stage:s,fromTray:false,bx:p.col*g.cW-p.pad,by:p.row*g.cH-p.pad,
            ox:px-(p.col*g.cW-p.pad),oy:py-(p.row*g.cH-p.pad)};
      updHUD(s); renderBoard(s); return;
    }
  }
}
document.addEventListener('mousemove',e=>{if(!drag)return;e.preventDefault();doMV(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(!drag)return;e.preventDefault();doMV(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
function doMV(cx,cy){
  if(!drag)return;
  const g=games[drag.stage]; if(!g) return;
  const r=g.bc.getBoundingClientRect();
  if(drag.fromTray){
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){
      drag.gc=Math.max(0,Math.min((g.gcols||GCOLS)-1,Math.floor((cx-r.left)*(g.bW/r.width)/g.cW)));
      drag.gr=Math.max(0,Math.min((g.grows||GROWS)-1,Math.floor((cy-r.top)*(g.bH/r.height)/g.cH)));
    }else drag.gc=null;
  }else{
    drag.bx=(cx-r.left)*(g.bW/r.width)-drag.ox;
    drag.by=(cy-r.top)*(g.bH/r.height)-drag.oy;
  }
  renderBoard(drag.stage);
}
document.addEventListener('mouseup',doUP);
document.addEventListener('touchend',doUP,{passive:false});
function doUP(e){
  if(!drag)return;
  const g=games[drag.stage]; if(!g) return;
  const s2=e.changedTouches?e.changedTouches[0]:e;
  const r=g.bc.getBoundingClientRect();
  const onB=s2.clientX>=r.left&&s2.clientX<=r.right&&s2.clientY>=r.top&&s2.clientY<=r.bottom;
  if(onB){
    const bx2=(s2.clientX-r.left)*(g.bW/r.width),by2=(s2.clientY-r.top)*(g.bH/r.height);
    const sc=Math.max(0,Math.min((g.gcols||GCOLS)-1,Math.round(bx2/g.cW-0.5)));
    const sr=Math.max(0,Math.min((g.grows||GROWS)-1,Math.round(by2/g.cH-0.5)));
    if(!g.pieces.some(q=>q.placed&&q!==drag.p&&q.col===sc&&q.row===sr)&&
       sc===drag.p.col&&sr===drag.p.row){
      drag.p.placed=true;
      if(drag.p.el)drag.p.el.style.display='none';
      if(drag.fromTray)g.moves++;
      snap(); updHUD(drag.stage);
      const stg=drag.stage; drag=null;
      renderBoard(stg);
      if(games[stg].pieces.every(p=>p.placed)){
        clearInterval(games[stg].ticker); doneSound();
        cleared.add(stg); updateNav();
        setTimeout(()=>showScr(stg===1?3:stg===2?5:7),800);
      }
      return;
    }
  }
  if(drag&&drag.p.el) drag.p.el.style.display='';
  const stg2=drag?drag.stage:null; drag=null;
  if(stg2) renderBoard(stg2);
}

window.addEventListener('resize',()=>{
  posNav();
  ['s1','s2','s3','s4','s5','s6','s7','s8'].forEach(updateLayout);
});

makeNav(); updateNav();

</script></body></html>
